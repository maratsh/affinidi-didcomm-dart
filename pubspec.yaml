  sdk: ^3.6.0

platforms:
  web:
  android:
  ios:
  linux:
  macos:
  windows:

dependencies:
  collection: ^1.19.1
  convert: ^3.1.2
  crypto: ^3.0.6
  crypto_keys_plus: ^0.5.0
  dio: ^5.9.0
